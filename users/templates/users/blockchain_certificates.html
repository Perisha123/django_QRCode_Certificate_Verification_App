{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blockchain Certificates</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">Your Certificates on Blockchain</h2>

    {% if certificates %}
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Certificate Hash</th>
                </tr>
            </thead>
            <tbody>
                {% for cert in certificates %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ cert }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <div class="alert alert-info">
            No certificates found on blockchain for your account.
        </div>
    {% endif %}

    <a href="{% url 'users_dashboard' %}" class="btn btn-primary mt-3">Back to Dashboard</a>
</div>

</body>
</html>
