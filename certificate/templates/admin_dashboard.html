<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
  <span class="navbar-brand">Admin Dashboard</span>
  <a href="{% url 'admin_logout' %}" class="btn btn-light">Logout</a>
</nav>

<div class="container mt-4">
  <h4>Total Certificates: {{ total }}</h4>

  <a href="{% url 'upload' %}" class="btn btn-success mb-3">Upload Certificate</a>

  <table class="table table-bordered">
    <tr><th>Name</th><th>Email</th><th>Hash</th><th>QR</th></tr>
    {% for cert in certificates %}
      <tr>
        <td>{{ cert.name }}</td>
        <td>{{ cert.email }}</td>
        <td>{{ cert.file_hash }}</td>
        <td><img src="{{ cert.qr_code.url }}" width="80"></td>
      </tr>
    {% endfor %}
  </table>
</div>

</body>
</html>
