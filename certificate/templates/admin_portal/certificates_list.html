<h2>All Certificates</h2>
<table class="table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Student Name</th>
            <th>Course</th>
            <th>QR Code</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for cert in certificates %}
        <tr>
            <td>{{ cert.id }}</td>
            <td>{{ cert.student_name }}</td>
            <td>{{ cert.course_name }}</td>
            <td>
                {% if cert.qr_code %}
                <a href="{{ cert.qr_code.url }}" target="_blank">
                    <img src="{{ cert.qr_code.url }}" width="50">
                </a>
                {% else %}
                N/A
                {% endif %}
            </td>
            <td>
                <a href="{% url 'edit_certificate' cert.id %}" class="btn btn-warning btn-sm">Edit</a>
                <a href="{% url 'delete_certificate' cert.id %}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this certificate?');">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
