<!-- templates/certificates_table.html -->
{% extends 'base.html' %}
{% block content %}
<h2>Certificates</h2>
<table border="1" cellpadding="5" cellspacing="0">
    <thead>
        <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Name</th>
            <th>Created At</th>
        </tr>
    </thead>
    <tbody>
        {% for cert in certificates %}
        <tr>
            <td>{{ cert.id }}</td>
            <td>{{ cert.email }}</td>
            <td>{{ cert.name }}</td>
            <td>{{ cert.created_at|date:"Y-m-d H:i" }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
