{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Certificate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-4">Upload Certificate</h2>

    <!-- Display message from view -->
    {% if message %}
        <div class="alert alert-info">{{ message }}</div>
    {% endif %}

    <!-- User upload form -->
    <form method="post" enctype="multipart/form-data" action="{% url 'users:user_upload_certificate' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Upload</button>
    </form>

</div>
</body>
</html>
