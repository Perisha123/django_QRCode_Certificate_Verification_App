<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logged Out</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5 text-center">
    <div class="card p-4 shadow">
        <h3 class="mb-3 text-success">You have been logged out successfully!</h3>
        <p>Click below to continue:</p>

        <a href="{% url 'admin_login' %}" class="btn btn-primary me-2 w-25">Login Again</a>

        <!-- Dashboard button only if still authenticated (optional) -->
        {% if request.user.is_authenticated and request.user.is_staff %}
            <a href="{% url 'dashboard' %}" class="btn btn-success w-25">Go to Dashboard</a>
        {% endif %}
    </div>
</div>

</body>
</html>
